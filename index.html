/* ============================================================ TAB QUYẾT TOÁN ============================================================ */
function qtAvailableMonths(h){
  const set={};
  (h.finance||[]).forEach(e=>{if(e.month)set[e.month]=1;});
  (h.lockedMonths||[]).forEach(m=>{if(m)set[m]=1;});
  return Object.keys(set).sort().reverse();
}
function qtLatestLocked(h){const lm=(h.lockedMonths||[]).slice().sort();return lm.length?lm[lm.length-1]:'';}
function setQtMonth(m){APP.qtMonth=m;render();}
/* Bù trừ tối thiểu số lần chuyển: người dư (bal>0) chuyển cho người thiếu (bal<0) */
function qtSettle(items){
  const debt=items.filter(p=>p.bal>0.5).map(p=>({name:p.name,amt:p.bal}));
  const cred=items.filter(p=>p.bal<-0.5).map(p=>({name:p.name,amt:-p.bal}));
  debt.sort((a,b)=>b.amt-a.amt);cred.sort((a,b)=>b.amt-a.amt);
  const tx=[];let i=0,j=0;
  while(i<debt.length&&j<cred.length){
    const m=Math.min(debt[i].amt,cred[j].amt);
    if(m>0.5)tx.push({from:debt[i].name,to:cred[j].name,amt:Math.round(m)});
    debt[i].amt-=m;cred[j].amt-=m;
    if(debt[i].amt<=0.5)i++;
    if(cred[j].amt<=0.5)j++;
  }
  return tx;
}
function renderTabQuyetToan(c,h){
  const months=qtAvailableMonths(h);
  if(!months.length){
    c.innerHTML=`<div class="placeholder-tab"><div class="ic"><i data-lucide="bar-chart-3"></i></div><h2 style="margin:0 0 6px">Quyết toán</h2><p>Chưa có khoản thu/chi nào để quyết toán.</p></div>`;return;
  }
  let month=APP.qtMonth;
  if(!month||months.indexOf(month)<0)month=qtLatestLocked(h)||months[0];
  const locked=(h.lockedMonths||[]).includes(month);
  const entries=(h.finance||[]).filter(e=>e.month===month);
  // Gom thu/chi theo người (ai nhập = người giữ tiền)
  const usersList=STORE.users()||[];const byId={};
  usersList.forEach(u=>{byId[u.id]={id:u.id,name:u.name||'(chưa đặt tên)',thu:0,chi:0};});
  entries.forEach(e=>{
    const id=e.userId||('nm:'+(e.userName||'?'));
    if(!byId[id])byId[id]={id:id,name:e.userName||'(không rõ)',thu:0,chi:0};
    const v=Number(e.amount)||0;
    if(e.kind==='thu')byId[id].thu+=v;else if(e.kind==='chi')byId[id].chi+=v;
  });
  const parts=Object.values(byId);
  const N=parts.length;
  const revenue=parts.reduce((s,p)=>s+p.thu,0);
  const cost=parts.reduce((s,p)=>s+p.chi,0);
  const profit=revenue-cost;
  const target=N?profit/N:0;
  parts.forEach(p=>{p.net=p.thu-p.chi;p.bal=p.net-target;});
  const tx=qtSettle(parts.map(p=>({name:p.name,bal:p.bal})));

  const monthOpts=months.map(m=>`<option value="${m}" ${m===month?'selected':''}>tháng ${esc(isoToMy(m))}${(h.lockedMonths||[]).includes(m)?' 🔒':''}</option>`).join('');
  const lockBadge=locked?`<span class="badge"><i data-lucide="lock"></i> Đã khoá</span>`:`<span class="badge danger">Chưa khoá</span>`;
  const partRows=parts.map(p=>{
    const pc=personColor(p.id);
    const col=p.bal>0.5?'#b45309':(p.bal<-0.5?'#16a34a':'inherit');
    return `<tr style="background:${pc.bg}"><td style="border-left:4px solid ${pc.bar}">${esc(p.name)}</td><td>${money(p.thu)}</td><td>${money(p.chi)}</td>
      <td>${money(p.net)}</td><td>${money(Math.round(target))}</td>
      <td style="color:${col};font-weight:600">${p.bal>0.5?'+':''}${money(Math.round(p.bal))}</td></tr>`;
  }).join('');
  const nameCol={};parts.forEach(p=>{nameCol[p.name]=personColor(p.id).bar;});
  const txHTML=tx.length?tx.map(t=>`<div class="card" style="display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px">
      <div><b style="color:${nameCol[t.from]||'inherit'}">${esc(t.from)}</b> &nbsp;→&nbsp; <b style="color:${nameCol[t.to]||'inherit'}">${esc(t.to)}</b></div>
      <div style="font-weight:800;font-size:17px">${money(t.amt)}</div></div>`).join('')
    :`<div class="empty"><div class="ic">✓</div>Đã cân bằng — không cần chuyển tiền.</div>`;

  c.innerHTML=`
    <div class="card" style="display:flex;align-items:flex-end;justify-content:space-between;gap:10px;flex-wrap:wrap;margin-bottom:12px">
      <div class="field" style="margin:0;flex:1;min-width:160px"><label style="font-size:13px">Tháng quyết toán</label>
        <select onchange="setQtMonth(this.value)">${monthOpts}</select></div>
      <div style="padding-bottom:6px">${lockBadge}</div>
    </div>
    ${locked?'':`<div class="hint" style="color:var(--danger);margin-bottom:10px">Lưu ý: tháng này CHƯA khoá — số liệu có thể còn thay đổi.</div>`}
    <div class="card" style="margin-bottom:12px">
      <div class="grid2">
        <div><div class="muted" style="font-size:13px">Doanh thu</div><div style="font-weight:800;font-size:18px">${money(revenue)}</div></div>
        <div><div class="muted" style="font-size:13px">Chi phí</div><div style="font-weight:800;font-size:18px">${money(cost)}</div></div>
      </div>
      <div style="margin-top:10px;border-top:1px solid var(--border);padding-top:10px">
        <span class="muted" style="font-size:13px">Lợi nhuận (Doanh thu − Chi phí)</span>
        <div style="font-weight:800;font-size:22px;color:${profit>=0?'#16a34a':'var(--danger)'}">${money(profit)}</div>
        <div class="muted" style="font-size:13px;margin-top:2px">Chia đều ${N} người · mỗi người: <b>${money(Math.round(target))}</b></div>
      </div>
    </div>
    <div class="card" style="margin-bottom:12px">
      <div style="font-weight:700;margin-bottom:8px">Chi tiết theo người</div>
      <div class="tablewrap"><table>
        <thead><tr><th>Người</th><th>Thu</th><th>Chi</th><th>Lãi ròng</th><th>Phần chia</th><th>Chênh lệch</th></tr></thead>
        <tbody>${partRows}</tbody></table></div>
      <div class="hint" style="margin-top:6px">Chênh lệch <b style="color:#b45309">+</b> = đang giữ dư phần của mình → chuyển bớt cho người khác. <b style="color:#16a34a">−</b> = được nhận về.</div>
    </div>
    <div style="font-weight:700;margin:6px 0 8px">Bù trừ & chuyển tiền</div>
    ${txHTML}`;
}

/* ============================================================ XUẤT HỢP ĐỒNG PDF ============================================================ */
function loadScript(src){return new Promise((res,rej)=>{if(document.querySelector(`script[data-src="${src}"]`))return res();
  const s=document.createElement('script');s.src=src;s.dataset.src=src;s.onload=()=>res();s.onerror=()=>rej(new Error('load'));document.head.appendChild(s);});}
async function ensurePdfMake(){
  if(window.pdfMake&&window.pdfMake.vfs)return;
  await loadScript('https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/pdfmake.min.js');
  await loadScript('https://cdn.jsdelivr.net/npm/pdfmake@0.2.7/build/vfs_fonts.js');
  if(!(window.pdfMake&&window.pdfMake.vfs))throw new Error('pdfmake');
}
function ulOrDots(arr){return (arr&&arr.length)?{ul:arr.slice(),margin:[0,2,0,8]}:{text:'……………………………………',margin:[0,2,0,8]};}
function sigImgNode(obj){const s=imgSrc(obj);return (s&&s.indexOf('data:')===0)?{image:s,fit:[150,55],alignment:'center',margin:[0,6,0,2]}:{text:'\n\n',margin:[0,12,0,0]};}
function photoNode(obj){const s=imgSrc(obj);return (s&&s.indexOf('data:')===0)?{image:s,fit:[470,330],alignment:'center',margin:[0,4,0,14]}:{text:'(Chưa có ảnh — mở app trên thiết bị đã chụp để xuất kèm ảnh)',italics:true,color:'#888',margin:[0,4,0,14]};}
/* pdfMake chỉ nhúng ảnh base64 -> tải ảnh từ link (Supabase) về dạng base64 rồi lưu vào IMGCACHE */
function ntBlobToDataURL(blob){return new Promise((res,rej)=>{const r=new FileReader();r.onload=()=>res(r.result);r.onerror=rej;r.readAsDataURL(blob);});}
async function ntEnsureDataUrl(obj){
  if(!obj||!obj.imgId)return;
  const cur=IMGCACHE[obj.imgId]; if(cur&&cur.indexOf('data:')===0)return; /* đã có base64 */
  const url=obj.url; if(!url)return;
  try{ const res=await fetch(url,{mode:'cors'}); if(!res.ok)return; const blob=await res.blob(); const d=await ntBlobToDataURL(blob); if(d&&d.indexOf('data:image')===0)IMGCACHE[obj.imgId]=d; }
  catch(e){ console.warn('Tải ảnh cho PDF lỗi:',url,e); }
}

async function exportContractPdf(ctId){
  const h=STORE.house(APP.houseId);const ct=(h.contracts||[]).find(x=>x.id===ctId);
  if(!ct){toast('Không tìm thấy hợp đồng','err');return;}
  toast('Đang tạo PDF…');
  try{await ensurePdfMake();}catch(e){toast('Cần kết nối mạng để tạo PDF','err');return;}
  try{
    const jobs=[ntEnsureDataUrl(h.manager&&h.manager.signature)];
    let dd,baseName;
    if(ct.type==='KTX'){
      const cc=ct.customer||{};
      jobs.push(ntEnsureDataUrl(cc.cccdPhoto),ntEnsureDataUrl(cc.customerPhoto),ntEnsureDataUrl(cc.signature));
      await Promise.all(jobs);
      dd=buildKtxDocDef(h,ct);baseName=cc.name||'KTX';
    }else{
      (ct.customers||[]).forEach(c=>jobs.push(ntEnsureDataUrl(c.cccdPhoto),ntEnsureDataUrl(c.customerPhoto),ntEnsureDataUrl(c.signature)));
      await Promise.all(jobs);
      dd=buildTroDocDef(h,ct);baseName=((ct.customers||[])[0]&&ct.customers[0].name)||'PhongTro';
    }
    pdfMake.createPdf(dd).getBlob(async(blob)=>{
      const fname=`HopDong_${String(baseName).replace(/\s+/g,'_')}.pdf`;
      const file=new File([blob],fname,{type:'application/pdf'});
      if(navigator.canShare&&navigator.canShare({files:[file]})){
        try{await navigator.share({files:[file],title:'Hợp đồng thuê phòng'});}catch(e){}
      }else{
        const url=URL.createObjectURL(blob);const a=document.createElement('a');a.href=url;a.download=fname;a.click();URL.revokeObjectURL(url);
        toast('Đã tải PDF (thiết bị không hỗ trợ chia sẻ trực tiếp)','ok');
      }
    });
  }catch(e){toast('Không tạo được PDF','err');}
}

/* ============================================================ GOOGLE SYNC ============================================================ */
function getSync(){try{return JSON.parse(localStorage.getItem('nhaTroLySon_sync'))||{};}catch(e){return {};}}
function setSync(c){try{localStorage.setItem('nhaTroLySon_sync',JSON.stringify(c));}catch(e){}}
function effectiveUrl(){return NT.user?'sb':'';} /* chỉ đồng bộ khi đã đăng nhập */
let _autoTimer=null,_suppressAuto=false,_syncing=false,_lastLocalWrite=0,_dataRefreshTimer=null;
function onDataChanged(){if(_suppressAuto)return;scheduleFlush();}
/* ===== Hàng đợi thao tác: gửi từng insert/update/delete theo bản ghi ===== */
function getOutbox(){try{return JSON.parse(localStorage.getItem('nhaTroLySon_outbox'))||[];}catch(e){return [];}}
function setOutbox(a){try{localStorage.setItem('nhaTroLySon_outbox',JSON.stringify(a));}catch(e){toast('Bộ nhớ tạm đầy — kết nối mạng để đồng bộ','err');}}
function enqueueOp(op){if(!effectiveUrl())return;const q=getOutbox();q.push(op);setOutbox(q);scheduleFlush();}
function scheduleFlush(){if(!effectiveUrl())return;clearTimeout(_autoTimer);_autoTimer=setTimeout(flushOutbox,1500);}
function collectOpImages(op,images){
  function walk(o){if(o&&o.imgId){if(!o.url){const d=o.data||IMGCACHE[o.imgId];if(d)images[o.imgId]=d;}delete o.data;}}
  function ct(c){if(!c)return;if(c.managerSignature)walk(c.managerSignature);
    if(c.type==='KTX'){if(c.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>c.customer[k]&&walk(c.customer[k]));}
    else (c.customers||[]).forEach(x=>['cccdPhoto','customerPhoto','signature'].forEach(k=>x[k]&&walk(x[k])));}
  if(op.house){if(op.house.manager&&op.house.manager.signature)walk(op.house.manager.signature);(op.house.contracts||[]).forEach(ct);}
  if(op.contract)ct(op.contract);
  if(op.data)(op.data.houses||[]).forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);(h.contracts||[]).forEach(ct);});
}
async function flushOutbox(){
  if(!effectiveUrl()||_syncing)return;
  if(!getOutbox().length)return;
  _syncing=true;
  try{
    while(true){
      const q=getOutbox();
      if(!q.length)break;
      const op=q[0];
      try{ await ntApplyOp(op); }
      catch(e){ console.error('Đồng bộ lỗi, sẽ thử lại sau:',op,e); toast('Chưa đồng bộ được — sẽ thử lại','err'); break; }
      const q2=getOutbox(); q2.shift(); setOutbox(q2);
    }
    const cfg=getSync();cfg.lastSync=Date.now();setSync(cfg);
    _lastLocalWrite=Date.now(); /* đánh dấu vừa ghi -> bỏ qua tiếng vọng realtime của chính mình */
  } finally { _syncing=false; }
  if(getOutbox().length) scheduleFlush();
}

function ntAvatarHtml(name,url,size){
  size=size||44;
  if(url) return `<img src="${esc(url)}" alt="" style="width:${size}px;height:${size}px;border-radius:50%;object-fit:cover;flex:none;vertical-align:middle;background:#e5e7eb">`;
  const ch=((name||'?').trim().charAt(0)||'?').toUpperCase();
  const col=personColor(name||'');
  return `<div style="width:${size}px;height:${size}px;border-radius:50%;background:${col.bar};color:#fff;display:inline-flex;align-items:center;justify-content:center;font-weight:700;flex:none;vertical-align:middle;font-size:${Math.round(size*0.42)}px">${esc(ch)}</div>`;
}
/* Thời gian: <24h ghi "x phút/giờ trước", sau 24h ghi ngày giờ cụ thể */
function ntTimeAgo(iso){
  if(!iso)return '';
  const t=new Date(iso).getTime(); if(isNaN(t))return '';
  const min=Math.floor((Date.now()-t)/60000);
  if(min<1)return 'Vừa xong';
  if(min<60)return min+' phút trước';
  const hr=Math.floor(min/60);
  if(hr<24)return hr+' giờ trước';
  return new Date(t).toLocaleString('vi-VN');
}
async function ntChangeAvatar(){
  const inp=document.createElement('input'); inp.type='file'; inp.accept='image/*';
  inp.style.position='fixed'; inp.style.left='-9999px'; document.body.appendChild(inp); /* iOS cần input nằm trong trang */
  inp.onchange=async()=>{
    const f=inp.files&&inp.files[0];
    try{
      if(!f)return;
      toast('Đang tải ảnh…');
      const dataUrl=await fileToResizedDataURL(f,400,0.85);
      let url=await ntUploadDataUrl('avatars/'+NT.user.id,dataUrl); if(!url)throw new Error('không tạo được link ảnh');
      url+='?v='+Date.now();
      const r=await SB.from('nt_profiles').update({avatar_url:url}).eq('id',NT.user.id); if(r.error)throw r.error;
      NT.user.avatar=url; const p=(NT.profiles||[]).find(x=>x.id===NT.user.id); if(p)p.avatar=url;
      toast('Đã cập nhật ảnh đại diện','ok'); openSync();
    }catch(e){ console.warn('avatar error',e); toast('Lỗi ảnh: '+(e&&e.message?e.message:e),'err'); }
    finally{ inp.remove(); }
  };
  inp.click();
}

function saveSyncUrl(){}
function buildSyncPayload(){
  const all=JSON.parse(JSON.stringify(STORE.all()));const images={};
  function walk(o){if(o&&o.imgId){if(!o.url){const d=o.data||IMGCACHE[o.imgId];if(d)images[o.imgId]=d;}delete o.data;}}
  all.houses.forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);
    (h.contracts||[]).forEach(ct=>{if(ct.managerSignature)walk(ct.managerSignature);
      if(ct.type==='KTX'){if(ct.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>ct.customer[k]&&walk(ct.customer[k]));}
      else (ct.customers||[]).forEach(c=>['cccdPhoto','customerPhoto','signature'].forEach(k=>c[k]&&walk(c[k])));});});
  return {action:'sync',data:all,images};
}
function applyUploaded(map){
  function walk(o){if(o&&o.imgId&&map[o.imgId]){o.url=map[o.imgId];}}
  STORE.houses().forEach(h=>{if(h.manager&&h.manager.signature)walk(h.manager.signature);
    (h.contracts||[]).forEach(ct=>{if(ct.managerSignature)walk(ct.managerSignature);
      if(ct.type==='KTX'){if(ct.customer)['cccdPhoto','customerPhoto','signature'].forEach(k=>ct.customer[k]&&walk(ct.customer[k]));}
      else (ct.customers||[]).forEach(c=>['cccdPhoto','customerPhoto','signature'].forEach(k=>c[k]&&walk(c[k])));});});
  STORE.save();
}
function syncNow(){doSync(false);}
async function doSync(isAuto){ try{ await flushOutbox(); await pullFromServer(); }catch(e){} }
/* Kéo dữ liệu mới nhất từ Supabase về */
async function pullFromServer(){
  if(!effectiveUrl())return false;
  if(getOutbox().length)return false; /* còn thao tác chờ gửi -> không ghi đè để tránh mất dữ liệu */
  ntLoading(true);
  try{
    const data=await ntPullAll();
    if(data){
      _suppressAuto=true;STORE.import(JSON.stringify(data));_suppressAuto=false;
      const cfg=getSync();cfg.lastSync=Date.now();setSync(cfg);
      return true;
    }
  }catch(e){_suppressAuto=false;console.error('Tải dữ liệu lỗi:',e);}
  finally{ ntLoading(false); }
  return false;
}
/* Nút "Tải mới": gửi thay đổi còn tồn -> kéo dữ liệu mới nhất về -> vẽ lại */
let _refreshing=false;
async function refreshNow(){
  if(_refreshing)return;
  if(!effectiveUrl()){toast('Chưa kết nối Google','err');return;}
  if(typeof navigator!=='undefined'&&navigator.onLine===false){toast('Không có mạng','err');return;}
  _refreshing=true;
  document.querySelectorAll('.refreshbtn').forEach(b=>b.classList.add('spin'));
  try{
    await flushOutbox();
    await pullFromServer();
    toast('Đã cập nhật','ok');
  }catch(e){toast('Không tải được','err');}
  finally{_refreshing=false;render();}
}

/* ---------- Tải toàn bộ dữ liệu từ Supabase -> cấu trúc lồng nhau ---------- */
async function ntPullAll(){
  const q=[
    SB.from('nt_houses').select('*'), SB.from('nt_rooms').select('*'),
    SB.from('nt_contracts').select('*'), SB.from('nt_customers').select('*'),
    SB.from('nt_finance').select('*'), SB.from('nt_devices').select('*'),
    SB.from('nt_maintenance_logs').select('*'), SB.from('nt_locked_months').select('*'),
    SB.from('nt_profiles').select('id,full_name,role,phone,avatar_url'), SB.from('nt_settings').select('*')
  ];
  const [houses,rooms,contracts,customers,finance,devices,logs,locked,profiles,settings]=await Promise.all(q);
  for(const r of [houses,rooms,contracts,customers,finance,devices,logs,locked,profiles,settings]){ if(r.error) throw r.error; }
  NT.profiles=(profiles.data||[]).map(p=>({id:p.id,name:p.full_name||p.phone,role:p.role,avatar:p.avatar_url||null}));
  const g=(arr,k)=>{const m={};(arr||[]).forEach(x=>{(m[x[k]]=m[x[k]]||[]).push(x);});return m;};
  const R=g(rooms.data,'house_id'), C=g(contracts.data,'house_id'), CU=g(customers.data,'contract_id'),
        F=g(finance.data,'house_id'), D=g(devices.data,'house_id'), L=g(logs.data,'device_id'), LM=g(locked.data,'house_id');
  const mkImg=(url)=>({imgId:uid(),data:null,url:url||null});
  const cust=(c)=>({name:c.name||'',dob:c.dob||'',phone:c.phone||'',cccd:c.cccd||'',bienso:c.bienso||'',
     cccdPhoto:mkImg(c.cccd_photo_url),customerPhoto:mkImg(c.customer_photo_url),signature:mkImg(c.signature_url)});
  const houseList=(houses.data||[]).map(h=>{
    const cl=h.clauses||{};
    const conts=(C[h.id]||[]).map(c=>{
      const custs=(CU[c.id]||[]).slice().sort((a,b)=>(a.ord||0)-(b.ord||0));
      const pr=c.prices||{};
      const base={id:c.id,type:c.type,roomId:c.room_id||'',rentStart:c.rent_start||'',rentEnd:c.rent_end||'',
        managerSignature:mkImg(c.manager_signature_url),status:c.status||'active'};
      if(c.end_reason)base.endReason=c.end_reason; if(c.ended_at)base.endedAt=c.ended_at; if(c.ended_by)base.endedBy=c.ended_by;
      if(c.type==='KTX'){ base.customer=custs.length?cust(custs[0]):blankCust(); base.guardian=c.guardian||{name:'',role:'Bố',phone:''}; base.pricePerBed=pr.pricePerBed||''; }
      else { base.customers=custs.map(cust); base.pricePerRoom=pr.pricePerRoom||''; base.waterPerPerson=pr.waterPerPerson||''; base.servicePerPerson=pr.servicePerPerson||''; base.vehiclePerVehicle=pr.vehiclePerVehicle||''; base.electricPerKwh=pr.electricPerKwh||''; }
      return base;
    });
    const fins=(F[h.id]||[]).map(f=>({id:f.id,kind:f.kind,month:f.month||'',targetType:f.target_type||'',targetKey:f.target_key||'',
       label:f.label||'',amount:f.amount==null?'':String(f.amount),note:f.note||'',userName:f.user_name||'',userId:f.created_by||'',
       ts:f.created_at?new Date(f.created_at).getTime():Date.now()}));
    const devs=(D[h.id]||[]).map(d=>({id:d.id,name:d.name||'',info:d.info||'',cycleMonths:d.cycle_months||'',
       logs:(L[d.id]||[]).map(l=>({id:l.id,content:l.content||'',ts:l.log_date||'',cost:l.cost==null?'':String(l.cost),note:l.note||'',userName:l.user_name||'',tsEntered:l.created_at?new Date(l.created_at).getTime():Date.now()})).sort((a,b)=>(a.tsEntered||0)-(b.tsEntered||0))}));
    return {id:h.id,name:h.name||'',address:h.address||'',
      manager:{name:h.manager_name||'',birthYear:h.manager_birth_year||'',signature:mkImg(h.manager_signature_url)},
      contractStart:h.contract_start||'',contractEnd:h.contract_end||'',
      dieu4:cl.dieu4||[],dieu5:cl.dieu5||[],dieu6:cl.dieu6||[],
      rooms:(R[h.id]||[]).map(r=>({id:r.id,name:r.name||'',type:r.type||'KTX',maxPeople:r.max_people||'',equipment:r.equipment||[]})),
      contracts:conts, finance:fins, devices:devs,
      lockedMonths:(LM[h.id]||[]).map(x=>x.month), cashflow:h.cashflow||[], expenseItems:h.expense_items||[]};
  });
  const am=((settings.data||[]).find(s=>s.key==='activeMonth')||{}).value||'';
  return {houses:houseList, users:NT.profiles.map(p=>({id:p.id,name:p.name})), activeMonth:am};
}

const numOrNull=(v)=>{ if(v===''||v==null)return null; const n=Number(String(v).replace(/\D/g,'')); return isNaN(n)?null:n; };
async function ntApplyOp(op){
  const me=getCurUser()||null;
  if(op.entity==='house'&&op.type==='upsert'){
    const h=op.house, m=h.manager||{};
    let r=await SB.from('nt_houses').upsert({id:h.id,name:h.name||null,address:h.address||null,manager_name:m.name||null,manager_birth_year:m.birthYear||null,
      manager_signature_url:(m.signature||{}).url||null,contract_start:h.contractStart||null,contract_end:h.contractEnd||null,
      clauses:{dieu4:h.dieu4||[],dieu5:h.dieu5||[],dieu6:h.dieu6||[]},cashflow:h.cashflow||[],expense_items:h.expenseItems||[],created_by:me}); if(r.error)throw r.error;
    const keep=new Set((h.rooms||[]).map(x=>x.id));
    const ex=await SB.from('nt_rooms').select('id').eq('house_id',h.id); if(ex.error)throw ex.error;
    const del=(ex.data||[]).map(x=>x.id).filter(id=>!keep.has(id));
    if(del.length){ r=await SB.from('nt_rooms').delete().in('id',del); if(r.error)throw r.error; }
    if((h.rooms||[]).length){ r=await SB.from('nt_rooms').upsert(h.rooms.map(x=>({id:x.id,house_id:h.id,name:x.name||null,type:x.type||null,max_people:x.maxPeople||null,equipment:x.equipment||[]}))); if(r.error)throw r.error; }
    r=await SB.from('nt_locked_months').delete().eq('house_id',h.id); if(r.error)throw r.error;
    if((h.lockedMonths||[]).length){ r=await SB.from('nt_locked_months').insert(h.lockedMonths.map(mo=>({house_id:h.id,month:mo}))); if(r.error)throw r.error; }
    await ntLog('update','house',h.id,h.id,'Cập nhật nhà '+(h.name||''));
  }
  else if(op.entity==='house'&&op.type==='delete'){
    const r=await SB.from('nt_houses').delete().eq('id',op.id); if(r.error)throw r.error;
    await ntLog('delete','house',op.id,op.id,'Xoá nhà');
  }
  else if(op.entity==='contract'&&op.type==='upsert'){
    const c=op.contract, hid=op.houseId;
    const pr=c.type==='KTX'?{pricePerBed:c.pricePerBed||''}:{pricePerRoom:c.pricePerRoom||'',waterPerPerson:c.waterPerPerson||'',servicePerPerson:c.servicePerPerson||'',vehiclePerVehicle:c.vehiclePerVehicle||'',electricPerKwh:c.electricPerKwh||''};
    let r=await SB.from('nt_contracts').upsert({id:c.id,house_id:hid,room_id:c.roomId||null,type:c.type,rent_start:c.rentStart||null,rent_end:c.rentEnd||null,
      prices:pr,guardian:c.type==='KTX'?(c.guardian||null):null,manager_signature_url:(c.managerSignature||{}).url||null,
      status:c.status||'active',end_reason:c.endReason||null,ended_at:c.endedAt||null,ended_by:c.endedBy||null,created_by:me}); if(r.error)throw r.error;
    r=await SB.from('nt_customers').delete().eq('contract_id',c.id); if(r.error)throw r.error;
    const custs=c.type==='KTX'?(c.customer?[c.customer]:[]):(c.customers||[]);
    if(custs.length){ r=await SB.from('nt_customers').insert(custs.map((cu,i)=>({id:c.id+'_c'+i,contract_id:c.id,name:cu.name||null,dob:cu.dob||null,phone:cu.phone||null,cccd:cu.cccd||null,bienso:cu.bienso||null,
      cccd_photo_url:(cu.cccdPhoto||{}).url||null,customer_photo_url:(cu.customerPhoto||{}).url||null,signature_url:(cu.signature||{}).url||null,ord:i}))); if(r.error)throw r.error; }
    await ntLog('update','contract',c.id,hid,'Cập nhật hợp đồng');
  }
  else if(op.entity==='contract'&&op.type==='delete'){
    const r=await SB.from('nt_contracts').delete().eq('id',op.id); if(r.error)throw r.error;
    await ntLog('delete','contract',op.id,op.houseId,'Xoá hợp đồng');
  }
  else if(op.entity==='finance'&&op.type==='upsert'){
    const e=op.entry, hid=op.houseId;
    const row={id:e.id,house_id:hid,kind:e.kind,month:e.month||null,target_type:e.targetType||null,target_key:e.targetKey||null,
      label:e.label||null,amount:numOrNull(e.amount),note:e.note||null,user_name:e.userName||null,created_by:me};
    if(e.ts)row.created_at=new Date(Number(e.ts)).toISOString();
    const r=await SB.from('nt_finance').upsert(row); if(r.error)throw r.error;
    await ntLog('update','finance',e.id,hid,(e.kind==='chi'?'Chi: ':'Thu: ')+(e.label||''));
  }
  else if(op.entity==='finance'&&op.type==='delete'){
    const r=await SB.from('nt_finance').delete().eq('id',op.id); if(r.error)throw r.error;
    await ntLog('delete','finance',op.id,op.houseId,'Xoá khoản tiền');
  }
  else if(op.entity==='device'&&op.type==='upsert'){
    const d=op.device, hid=op.houseId;
    let r=await SB.from('nt_devices').upsert({id:d.id,house_id:hid,name:d.name||null,info:d.info||null,cycle_months:d.cycleMonths||null}); if(r.error)throw r.error;
    r=await SB.from('nt_maintenance_logs').delete().eq('device_id',d.id); if(r.error)throw r.error;
    if((d.logs||[]).length){ r=await SB.from('nt_maintenance_logs').insert(d.logs.map(l=>{const o={id:l.id,device_id:d.id,content:l.content||null,log_date:l.ts||null,cost:numOrNull(l.cost),note:l.note||null,user_name:l.userName||null};if(l.tsEntered)o.created_at=new Date(Number(l.tsEntered)).toISOString();return o;})); if(r.error)throw r.error; }
    await ntLog('update','device',d.id,hid,'Cập nhật thiết bị '+(d.name||''));
  }
  else if(op.entity==='device'&&op.type==='delete'){
    const r=await SB.from('nt_devices').delete().eq('id',op.id); if(r.error)throw r.error;
    await ntLog('delete','device',op.id,op.houseId,'Xoá thiết bị');
  }
  else if(op.entity==='settings'&&op.type==='set'){
    if(typeof op.activeMonth==='string'){ const r=await SB.from('nt_settings').upsert({key:'activeMonth',value:op.activeMonth}); if(r.error)throw r.error; }
  }
}

  const c=document.getElementById('ntBellCount'); const n=ntCtxUnread();
  if(c){ if(n>0){c.textContent=n>99?'99+':n;c.style.display='';} else {c.style.display='none';} }
  try{ if('setAppBadge' in navigator){ if(NT_UNREAD_ALL>0) navigator.setAppBadge(NT_UNREAD_ALL); else navigator.clearAppBadge(); } }catch(e){} /* icon app: tổng */
}
async function ntRefreshBadge(){
  if(!NT.user)return;
  try{
    const {data}=await SB.from('nt_notifications').select('activity:nt_activity_log(house_id)').eq('user_id',NT.user.id).is('read_at',null);
    NT_UNREAD_ALL=(data||[]).length; NT_UNREAD_HOUSE={};
    (data||[]).forEach(n=>{const hid=(n.activity||{}).house_id; if(hid)NT_UNREAD_HOUSE[hid]=(NT_UNREAD_HOUSE[hid]||0)+1;});
    ntUpdateBell();
  }catch(e){}
}
function ntStartRealtime(){
  if(!NT.user)return;
  ntEnablePush(false); /* đăng ký nhận đẩy nếu chưa có */
  ntRefreshBadge();
  try{
    SB.channel('nt_notif_'+NT.user.id)
      .on('postgres_changes',{event:'INSERT',schema:'public',table:'nt_notifications',filter:'user_id=eq.'+NT.user.id},
        ()=>{ ntRefreshBadge(); toast('🔔 Có cập nhật mới'); scheduleDataRefresh(); })
      .subscribe();
  }catch(e){ console.warn('realtime',e); }
  ntStartDataRealtime();
}
/* ---------- Tự cập nhật dữ liệu realtime (kiểu Zalo: người khác đổi -> tự hiện) ---------- */
function scheduleDataRefresh(){
  if(Date.now()-_lastLocalWrite < 2500) return; /* bỏ qua tiếng vọng thay đổi của chính mình */
  clearTimeout(_dataRefreshTimer);
  _dataRefreshTimer=setTimeout(ntLiveRefresh, 700); /* gộp nhiều thay đổi gần nhau */
}
async function ntLiveRefresh(){
  if(!NT.user||_syncing)return;
  /* đang mở form/hộp thoại -> chờ, không làm giật màn hình đang nhập */
  if(($('#modalBg')&&$('#modalBg').classList.contains('show'))||($('#modal2Bg')&&$('#modal2Bg').classList.contains('show'))){
    _dataRefreshTimer=setTimeout(ntLiveRefresh, 1500); return;
  }
  const y=window.scrollY;
  const ok=await pullFromServer();
  if(ok){ render(); window.scrollTo(0,y); } /* giữ nguyên vị trí đang xem */
}
function ntStartDataRealtime(){
  if(!NT.user)return;
  try{
    let ch=SB.channel('nt_data_'+NT.user.id);
    ['nt_houses','nt_rooms','nt_contracts','nt_customers','nt_finance','nt_devices','nt_maintenance_logs','nt_locked_months']
      .forEach(t=>{ ch=ch.on('postgres_changes',{event:'*',schema:'public',table:t}, scheduleDataRefresh); });
    ch.subscribe();
  }catch(e){ console.warn('data realtime',e); }
}
function ntNotifScope(){ return (APP.screen==='house'&&APP.houseId)?APP.houseId:null; }
async function ntClearNotifications(){
  const scope=ntNotifScope();
  try{
    if(scope){
      const {data}=await SB.from('nt_notifications').select('id,activity:nt_activity_log(house_id)').eq('user_id',NT.user.id);
      const ids=(data||[]).filter(n=>(n.activity||{}).house_id===scope).map(n=>n.id);
      if(ids.length){ const r=await SB.from('nt_notifications').delete().in('id',ids); if(r.error)throw r.error; }
    }else{
      const r=await SB.from('nt_notifications').delete().eq('user_id',NT.user.id); if(r.error)throw r.error;
    }
    const box=document.getElementById('ntNotifList'); if(box)box.innerHTML='<div class="empty">Chưa có thông báo</div>';
    await ntRefreshBadge();
    toast('Đã xóa thông báo','ok');
  }catch(e){ console.warn('clear notif',e); toast('Không xóa được: '+(e&&e.message?e.message:e),'err'); }
}
async function ntOpenNotifications(){
  const scope=ntNotifScope();
  const hname=scope?((STORE.house(scope)||{}).name||''):'';
  openModal({title: scope?('Thông báo · '+hname):'Thông báo',
    bodyHTML:`<div style="display:flex;justify-content:flex-end;margin-bottom:4px"><button class="linkbtn" onclick="ntClearNotifications()"><i data-lucide="trash-2"></i> Xóa tất cả</button></div>
      <div id="ntNotifList" style="max-height:60vh;overflow:auto">Đang tải…</div>`,
    footHTML:'<button class="btn sec" onclick="closeModal()">Đóng</button>'});
  try{
    const {data,error}=await SB.from('nt_notifications')
      .select('id,read_at,created_at,activity:nt_activity_log(actor_id,actor_name,summary,created_at,house_id)')
      .eq('user_id',NT.user.id).order('created_at',{ascending:false}).limit(100);
    if(error)throw error;
    const box=document.getElementById('ntNotifList'); if(!box)return;
    const prof={}; (NT.profiles||[]).forEach(p=>prof[p.id]=p);
    let rows=data||[];
    if(scope) rows=rows.filter(n=>(n.activity||{}).house_id===scope);
    const show=rows.slice(0,50);
    if(!show.length){ box.innerHTML='<div class="empty">Chưa có thông báo'+(scope?' cho nhà này':'')+'</div>'; }
    else{
      box.innerHTML=show.map(n=>{const a=n.activity||{};const unread=!n.read_at;
        const av=ntAvatarHtml(a.actor_name,(prof[a.actor_id]||{}).avatar,44);
        return `<div style="display:flex;gap:12px;align-items:flex-start;padding:11px 4px;border-bottom:1px solid var(--border)">
          ${av}
          <div style="flex:1;min-width:0">
            <div style="line-height:1.35"><b>${esc(a.actor_name||'')}</b> ${esc(a.summary||'')}</div>
            <div class="muted" style="font-size:12px;margin-top:3px">${ntTimeAgo(a.created_at)}</div>
          </div>
          ${unread?'<span style="width:9px;height:9px;border-radius:50%;background:var(--primary);flex:none;margin-top:6px"></span>':''}
        </div>`;}).join('');
    }
    /* đánh dấu đã đọc đúng phạm vi đang xem */
    if(scope){ const ids=rows.filter(n=>!n.read_at).map(n=>n.id); if(ids.length) await SB.from('nt_notifications').update({read_at:new Date().toISOString()}).in('id',ids); }
    else { await SB.from('nt_notifications').update({read_at:new Date().toISOString()}).eq('user_id',NT.user.id).is('read_at',null); }
    await ntRefreshBadge();
  }catch(e){ const box=document.getElementById('ntNotifList'); if(box)box.innerHTML='<div class="empty">Không tải được thông báo</div>'; }
}
/* ---------- Web Push: đăng ký nhận đẩy (số nhảy trên icon cả khi app đóng) ---------- */
function urlB64ToUint8(base64){
  const pad='='.repeat((4-base64.length%4)%4);
  const b=(base64+pad).replace(/-/g,'+').replace(/_/g,'/');
  const raw=atob(b); const arr=new Uint8Array(raw.length);
  for(let i=0;i<raw.length;i++)arr[i]=raw.charCodeAt(i); return arr;
}
async function ntEnablePush(force){
  if(!NT.user||!('serviceWorker' in navigator)||!('PushManager' in window))return;
  try{
    const reg=await navigator.serviceWorker.register('sw.js');
    let perm=Notification.permission;
    if(perm==='default') perm=await Notification.requestPermission();
    if(perm!=='granted'){ if(force)toast('Chưa bật thông báo — vào Cài đặt để cho phép','err'); return; }
    let sub=await reg.pushManager.getSubscription();
    if(force && sub){ /* hủy đăng ký cũ để tạo lại đúng khóa hiện tại */
      const oldEp=sub.endpoint; try{await sub.unsubscribe();}catch(e){}
      try{await SB.from('nt_push_subscriptions').delete().eq('endpoint',oldEp);}catch(e){}
      sub=null;
    }
    if(!sub){ sub=await reg.pushManager.subscribe({userVisibleOnly:true, applicationServerKey:urlB64ToUint8(VAPID_PUBLIC)}); }
    const j=sub.toJSON();
    await SB.from('nt_push_subscriptions').upsert({user_id:NT.user.id, endpoint:sub.endpoint, p256dh:j.keys.p256dh, auth:j.keys.auth},{onConflict:'endpoint'});
  }catch(e){ console.warn('Bật đẩy lỗi:',e); if(force)toast('Bật thông báo lỗi','err'); }
}

/* ---------- Thanh tải trên cùng ---------- */
function ntLoading(on){ const el=document.getElementById('ntLoad'); if(!el)return;
  if(on){ el.className='ntload'; void el.offsetWidth; el.className='ntload on'; }
  else { el.className='ntload done'; setTimeout(()=>{ if(el.className==='ntload done') el.className='ntload'; },600); }
}
/* ---------- Lucide icons: tự vẽ lại mỗi khi giao diện đổi ---------- */
let _licT=null,_licObs=null;
function ntIcons(){ clearTimeout(_licT); _licT=setTimeout(()=>{
  try{ if(window.lucide){ if(_licObs)_licObs.disconnect(); lucide.createIcons(); if(_licObs)_licObs.observe(document.documentElement,{childList:true,subtree:true}); } }catch(e){}
}, 40); }
try{ _licObs=new MutationObserver(ntIcons); _licObs.observe(document.documentElement,{childList:true,subtree:true}); }catch(e){}
ntIcons();

/* ---------- Khởi động ---------- */

  try{await idbOpen();const all=await idbAll();all.forEach(x=>{IMGCACHE[x.imgId]=x.data;});}catch(e){}

  catch(e){ ntShowLogin('Không kết nối được máy chủ'); }
})();
document.addEventListener('visibilitychange',function(){
  if(document.visibilityState==='visible'&&NT.user&&!$('#modalBg').classList.contains('show')&&!_syncing){
    flushOutbox().then(function(){return pullFromServer();}).then(function(ok){if(ok)render();});
  }
});
